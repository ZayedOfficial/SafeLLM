model: mistralai/Mistral-7B-Instruct-v0.3
task: instruction-tuning
method: qlora

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  max_length: 1024
  seed: 42

output:
  checkpoint_dir: checkpoints/scout
  hub_model_id: zayedrehman/safelang-scout

# Fine-tune via: notebooks/train_scout.ipynb (Google Colab A100)
